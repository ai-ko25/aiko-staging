<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aiko</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>

  <div id="app">

    <header class="topbar">
      <!-- The brand doubles as a "home" button back to the world map. -->
      <button type="button" class="brand" id="home-btn">
        <span class="brand-mark" aria-hidden="true">◆</span>
        <span class="brand-name" data-i18n="appTitle">Aiko</span>
      </button>

      <div class="topbar-right">
        <p class="score" id="score" hidden></p>
        <button type="button" class="lang-toggle" id="lang-toggle"></button>
      </div>
    </header>

    <main class="stage">

      <!-- Shown while a file is being fetched. -->
      <section class="panel" id="loading-screen">
        <p class="loading-text" data-i18n="loading">Getting things ready…</p>
      </section>

      <!-- Shown if content couldn't load. The English text is inline on purpose:
           this screen appears exactly when the translation file failed. -->
      <section class="panel panel-error" id="error-screen" hidden>
        <h1 class="panel-title" data-i18n="errorTitle">Aiko couldn't load the content</h1>
        <p class="panel-body" data-i18n="errorBody">
          This usually means the page was opened directly from a folder. Aiko needs a
          small local server. Open a terminal in the project folder, run the command
          below, then visit http://localhost:8000
        </p>
        <code class="error-hint">python3 serve.py</code>
      </section>

      <!-- 1. OPEN, the companion greets the child (dark home, styled from
           aiko_game_demo-2.html). -->
      <section class="dark-screen" id="open-screen" hidden>
        <div class="home">
          <img class="home-aiko" src="assets/aiko/idle.png" alt="">
          <div class="home-speech">
            <span class="home-greeting" data-i18n="greeting"></span>
            <span class="home-tagline" data-i18n="tagline"></span>
          </div>
          <button type="button" class="cta" id="enter-btn" data-i18n="enter"></button>
        </div>
      </section>

      <!-- 2. WORLD MAP, the four regions as islands along a winding path
           (styled from aiko_game_demo-2.html). Islands built by ui.js. -->
      <section class="dark-screen" id="world-screen" hidden>
        <div class="map-head">
          <h2 data-i18n="worldTitle"></h2>
          <p data-i18n="worldSubtitle"></p>
        </div>
        <div class="map-canvas">
          <svg class="map-path" viewBox="0 0 340 500" preserveAspectRatio="none" aria-hidden="true">
            <path d="M 90 90 Q 240 130 250 230 Q 255 330 100 350 Q 40 365 120 450"
                  fill="none" stroke="rgba(239,159,39,.35)" stroke-width="3"
                  stroke-dasharray="6 8" stroke-linecap="round"/>
          </svg>
          <div class="islands" id="region-grid"></div>
        </div>
      </section>

      <!-- 3. REGION, its topics as a list (styled from aiko_game_demo-2.html). -->
      <section class="dark-screen" id="region-screen" hidden>
        <div class="region-banner">
          <button type="button" class="back" id="region-back" data-i18n="back"></button>
          <h2 id="region-title"></h2>
          <p id="region-tagline"></p>
        </div>
        <div class="topics" id="topic-grid"></div>
      </section>

      <!-- 4. TOPIC, its missions as a list (same dark list style). -->
      <section class="dark-screen" id="topic-screen" hidden>
        <div class="region-banner">
          <button type="button" class="back" id="topic-back" data-i18n="back"></button>
          <h2 id="topic-title"></h2>
          <p id="topic-desc"></p>
        </div>
        <ul class="topics" id="mission-list"></ul>
      </section>

      <!-- 5. MISSION, the scene plays: the message arrives, the child taps the
           red flags in it (SPOT), picks the safe move (DECIDE), Aiko reacts and
           teaches (REACT). ui.js drives everything inside the frame. -->
      <section class="panel panel-scene" id="mission-screen" hidden>
        <button type="button" class="back-link" id="mission-back" data-i18n="back"></button>

        <div class="scene-frame">
          <div class="sun" aria-hidden="true"></div>

          <!-- HUD: setting chip and stars, floating over the top of the scene
               (copied from the runner). The progress bar is its own strip just
               below, filling as each message is cleared. -->
          <div class="scene-hud">
            <span class="scene-chip" id="scene-setting"></span>
            <span class="scene-chip scene-stars">⭐ <span id="star-count">0</span></span>
          </div>
          <div class="scene-progress" aria-hidden="true"><i id="progress-fill"></i></div>

          <div class="scene-stage" id="scene-stage">
            <!-- Atmosphere: soft layered hills, floating motes, a ground strip,
                 and stepping tiles that light up as the conversation advances. -->
            <div class="layer hills-far" aria-hidden="true"><span></span><span></span><span></span></div>
            <div class="layer hills-near" aria-hidden="true"><span></span><span></span><span></span></div>
            <span class="mote" style="inset-inline-start:18%;inset-block-start:22%;animation-duration:4s" aria-hidden="true"></span>
            <span class="mote" style="inset-inline-start:64%;inset-block-start:16%;animation-duration:5s;animation-delay:1s" aria-hidden="true"></span>
            <span class="mote" style="inset-inline-start:40%;inset-block-start:34%;animation-duration:4.5s;animation-delay:.6s" aria-hidden="true"></span>
            <span class="mote" style="inset-inline-start:80%;inset-block-start:40%;animation-duration:5.5s;animation-delay:1.4s" aria-hidden="true"></span>
            <div class="scene-ground" aria-hidden="true"></div>
            <div class="path" id="path" aria-hidden="true"></div>

            <!-- The mini-game the child is already playing when the mission
                 opens. Rocks slide in along the ground and a tap makes the kid
                 jump. The stranger later walks in on this same track, and the
                 game stops: that is the interruption the mission is about. -->
            <div class="run-hud" id="run-hud" hidden>
              <span aria-hidden="true">🏃</span><span id="run-score">0</span>
            </div>
            <div class="obstacles" id="obstacles" aria-hidden="true"></div>
            <p class="run-coach" id="run-coach" hidden></p>

            <!-- Aiko floats just above the kid, glowing, standing in the scene.
                 ui.js swaps its image and toggles cheer / worried as it reacts. -->
            <div class="scene-aiko-glow" aria-hidden="true"></div>
            <figure class="scene-aiko" id="aiko-figure">
              <img class="aiko-img" id="aiko-img" src="assets/aiko/idle.png" alt="">
            </figure>

            <!-- Characters stand ON the ground. The kid is you; the stranger
                 slides in from the side when their message arrives. -->
            <svg class="kid" id="kid" viewBox="0 0 90 110" aria-hidden="true">
              <defs><linearGradient id="kidShirt" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3FD39B"/><stop offset="1" stop-color="#1D9E75"/></linearGradient></defs>
              <ellipse cx="45" cy="106" rx="22" ry="5" fill="rgba(40,30,80,.18)"/>
              <path d="M28 70 Q28 58 45 58 Q62 58 62 70 L62 98 Q62 102 58 102 L32 102 Q28 102 28 98 Z" fill="url(#kidShirt)"/>
              <circle cx="45" cy="38" r="22" fill="#F2C79B"/>
              <path d="M24 34 Q26 14 45 14 Q64 14 66 34 Q60 26 45 26 Q30 26 24 34 Z" fill="#5A3B22"/>
              <circle cx="38" cy="40" r="2.7" fill="#3a2a1a"/><circle cx="52" cy="40" r="2.7" fill="#3a2a1a"/>
              <path d="M40 47 Q45 51 50 47" stroke="#3a2a1a" stroke-width="2.4" fill="none" stroke-linecap="round"/>
              <ellipse cx="36" cy="44" rx="3" ry="2" fill="#F7A8C4" opacity=".5"/><ellipse cx="54" cy="44" rx="3" ry="2" fill="#F7A8C4" opacity=".5"/>
              <rect x="59" y="64" width="13" height="24" rx="5" fill="#7F77DD"/>
            </svg>

            <svg class="stranger" id="stranger" viewBox="0 0 90 110" aria-hidden="true">
              <ellipse cx="45" cy="106" rx="20" ry="5" fill="rgba(40,30,80,.18)"/>
              <path d="M28 72 Q28 60 45 60 Q62 60 62 72 L62 100 Q62 102 60 102 L30 102 Q28 102 28 100 Z" fill="#8E8AA8"/>
              <circle cx="45" cy="40" r="21" fill="#A9A4C2"/>
              <path d="M24 40 Q45 22 66 40" stroke="#6E6A88" stroke-width="5" fill="none"/>
              <rect x="21" y="39" width="7" height="12" rx="3.5" fill="#6E6A88"/><rect x="62" y="39" width="7" height="12" rx="3.5" fill="#6E6A88"/>
              <circle cx="39" cy="40" r="2.7" fill="#3a3650"/><circle cx="52" cy="40" r="2.7" fill="#3a3650"/>
              <path d="M40 48 Q45 46 50 48" stroke="#3a3650" stroke-width="2.2" fill="none" stroke-linecap="round"/>
              <text x="45" y="32" font-size="13" text-anchor="middle" fill="#3a3650" font-family="Arial" font-weight="bold">?</text>
            </svg>

            <!-- Bubbles: the stranger's message (white, top end-side) and Aiko's
                 own reply (purple, start-side), each with a tail, like the runner. -->
            <div class="bubble bubble-stranger" id="stranger-bubble">
              <small id="sender-label"></small>
              <span class="bubble-msg" id="message-text"></span>
            </div>
            <div class="bubble bubble-aiko" id="aiko-bubble" role="status" aria-live="polite">
              <span id="aiko-bubble-text"></span>
            </div>

            <!-- Where the sketchy part of the message goes. It sits in the corner
                 OPPOSITE the stranger, so the drag physically pulls the message
                 away from him and toward safety. A button, so tap and keyboard
                 both reach it when a drag will not do. -->
            <button type="button" class="grownup" id="grownup" hidden>
              <svg class="grownup-icon" viewBox="0 0 64 64" aria-hidden="true">
                <rect x="28" y="38" width="8" height="22" rx="3" fill="#8e79d4"/>
                <rect x="8" y="12" width="48" height="28" rx="11" fill="#1d9e75"/>
                <rect x="18" y="23" width="28" height="7" rx="3.5" fill="#0f6f52"/>
                <circle cx="52" cy="11" r="6" fill="#ef9f27"/>
              </svg>
              <span class="grownup-label" data-i18n="showGrownup"></span>
            </button>
          </div>

          <!-- The dock slides up with a hint, then the Decide choice cards. -->
          <div class="dock" id="dock">
            <p class="dock-hint" id="dock-hint"></p>
            <ul class="dock-choices" id="choices"></ul>
            <!-- Appears a few seconds after the last flag is found, so the child
                 sets the pace and gets to enjoy the win first. -->
            <button type="button" class="btn keep-going" id="spot-continue" data-i18n="keepGoing" hidden></button>
            <div class="dock-after" id="feedback" hidden>
              <p class="takeaway" id="takeaway" hidden>
                <span class="takeaway-label" data-i18n="takeawayLabel"></span>
                <span id="takeaway-text"></span>
              </p>
              <button type="button" class="btn btn-primary" id="next-btn"></button>
            </div>
          </div>
        </div>
      </section>

      <!-- Topic finished, the big celebration: confetti, glow, stars, and a
           note for the grown-ups. -->
      <section class="panel panel-center" id="complete-screen" hidden>
        <figure class="aiko aiko-lg is-safe aiko-celebrate">
          <img class="aiko-img" src="assets/aiko/celebrate.png" alt="">
        </figure>
        <h1 class="panel-title" data-i18n="finishedTitle"></h1>
        <div class="star-row" id="star-row"></div>
        <p class="panel-body" id="final-score"></p>
        <p class="parent-note">
          <strong data-i18n="parentNoteTitle"></strong>
          <span id="parent-note-text"></span>
        </p>
        <div class="button-row">
          <button type="button" class="btn btn-primary" id="replay-btn" data-i18n="replay"></button>
          <button type="button" class="btn btn-ghost" id="more-topics-btn" data-i18n="backToTopics"></button>
        </div>
      </section>

    </main>

    <footer class="footer">
      <p data-i18n="footer"></p>
    </footer>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
